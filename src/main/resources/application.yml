server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    accept-count: 100
    connection-timeout: 30000

spring:
  application:
    name: jiaotou-bigmodel

  # 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jiaotou_bigmodel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: your_mysql_password
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:         # 无密码留空，有密码填写
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  # 文件上传
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.jiaotou.bigmodel.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: JiaoTouKeJiZhengQiBigModel2025SecretKey@#$%  # 生产环境请换成随机强密钥
  expiration: 86400000   # 24小时（毫秒）

# 大模型配置（OpenAI兼容格式）
llm:
  base-url: https://api.openai.com/v1   # 替换为实际大模型API地址
  api-key: sk-your-api-key-here          # 替换为实际API Key
  model: gpt-4o-mini                     # 替换为实际模型名称
  max-tokens: 4096
  temperature: 0.7

# 问数模块 - 业务数据源（只读账号）
datasource:
  query:
    url: jdbc:mysql://localhost:3306/jiaotou_biz?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: readonly_user
    password: readonly_password

# 文件存储路径
file:
  upload-path: ./uploads/

# 日志
logging:
  level:
    com.jiaotou.bigmodel: DEBUG
    com.baomidou.mybatisplus: INFO
  file:
    name: ./logs/bigmodel.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
